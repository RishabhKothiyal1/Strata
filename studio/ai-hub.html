              </div>
              <div class="flex items-center justify-between"><span class="text-sm text-[var(--text-secondary)]">Streaming</span>
                <button class="w-9 h-5 rounded-full transition-colors relative" :class="settings.streaming ? 'bg-[var(--accent)]' : 'bg-[var(--bg-elevated)]'" @click="settings.streaming = !settings.streaming">
                  <div class="w-3.5 h-3.5 rounded-full bg-white absolute top-0.5 transition-all" :class="settings.streaming ? 'left-[18px]' : 'left-[2px]'"></div>
                </button>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- Fallback for other pages -->
      <template x-if="!['overview','providers','models','usage','prompts','agents','workflows','documents','settings'].includes(currentPage)">
        <div class="flex items-center justify-center py-20">
          <div class="text-center">
            <svg class="w-12 h-12 text-[var(--text-muted)] mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
            <p class="text-sm text-[var(--text-muted)]">This section is being built.</p>
            <p class="text-xs text-[var(--text-muted)] mt-1">Check back soon.</p>
          </div>
        </div>
      </template>
    </main>

    <!-- Loading State -->
    <div x-show="loading" class="flex-1 flex items-center justify-center">
      <div class="text-center">
        <svg class="w-8 h-8 text-[var(--accent)] mx-auto mb-3 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        <p class="text-xs text-[var(--text-muted)]">Loading...</p>
      </div>
    </div>

    <!-- Error State -->
    <div x-show="error" class="flex-1 flex items-center justify-center">
      <div class="text-center max-w-md">
        <svg class="w-12 h-12 text-[var(--danger)] mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
        <p class="text-sm text-[var(--text-primary)] font-medium mb-1">Something went wrong</p>
        <p class="text-xs text-[var(--text-muted)] mb-4" x-text="error"></p>
        <button class="btn btn-primary btn-sm" @click="refresh()">Try Again</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Command Palette -->
  <div class="modal-overlay" :class="{'active': showCommandPalette}" @click.self="showCommandPalette = false">
    <div class="modal !p-0 !max-w-lg" @click.stop>
      <div class="p-4 border-b border-[var(--border)]">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-[var(--text-muted)] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" placeholder="Search pages and actions..." class="border-none bg-transparent text-sm outline-none flex-1 text-[var(--text-primary)]" x-ref="commandInput" @keydown.escape="showCommandPalette = false" @keydown.down.prevent="$focus($el.nextElementSibling)" @keydown.up.prevent="$focus($el.previousElementSibling)">
        </div>
      </div>
      <div class="p-2 max-h-64 overflow-y-auto">
        <template x-for="item in commandItems" :key="item.id">
          <button class="flex items-center gap-3 w-full px-3 py-2.5 rounded-md text-sm text-[var(--text-secondary)] hover:bg-white/[0.03] hover:text-[var(--text-primary)] transition-colors text-left" @click="showCommandPalette = false; navigate(item.id)">
            <span x-html="item.icon" class="w-4 h-4 flex-shrink-0"></span>
            <span x-text="item.label"></span>
            <span class="ml-auto text-[10px] text-[var(--text-muted)]" x-text="item.shortcut || ''"></span>
          </button>
        </template>
      </div>
    </div>
  </div>

  <!-- Provider Modal -->
  <div class="modal-overlay" :class="{'active': showProviderModal}">
    <div class="modal" @click.stop>
      <div class="modal-header">
        <h3 x-text="editingProvider ? 'Edit Provider' : 'Add Provider'"></h3>
        <button class="btn-icon" @click="showProviderModal = false">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="space-y-3">
        <div><label>Provider</label>
          <select x-model="providerForm.provider" class="bg-[var(--bg-card)]">
            <option value="">Select provider...</option>
            <template x-for="p in availableProviderTypes" :key="p.id"><option :value="p.id" x-text="p.name"></option></template>
          </select>
        </div>
        <div><label>API Key</label><input type="password" x-model="providerForm.apiKey" placeholder="sk-..."></div>
        <div><label>Base URL</label><input type="text" x-model="providerForm.baseUrl" placeholder="https://api.openai.com/v1"></div>
        <div><label>Default Model</label><input type="text" x-model="providerForm.defaultModel" placeholder="gpt-4o"></div>
      </div>
      <div class="flex justify-end gap-2 mt-5 pt-4 border-t border-[var(--border)]">
        <button class="btn btn-ghost btn-sm" @click="showProviderModal = false">Cancel</button>
        <button class="btn btn-primary btn-sm" @click="saveProvider()">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
function app() {
  return {
    // Navigation
    currentPage: 'overview',
    sidebarCollapsed: false,
    showCommandPalette: false,
    loading: true,
    error: null,

    // Data
    stats: [],
    providers: [],
    models: [],
    prompts: [],
    agents: [],
    workflows: [],
    activity: [],

    // Models
    modelSearch: '',
    modelFilterProvider: '',
    modelFilterStatus: '',
    modelSortBy: 'name',
    modelSortDir: 'asc',

    // Usage
    usageStats: [],
    chartData: [],
    providerBreakdown: [],
    docStats: {},

    // Settings
    settings: {
      gatewayUrl: localStorage.getItem('strata_gateway') || 'http://localhost:8000',
      apiToken: localStorage.getItem('strata_token') || '',
      defaultProvider: '',
      maxRetries: 3,
      timeout: 60,
      streaming: true,
    },

    // Provider Modal
    showProviderModal: false,
    editingProvider: null,
    providerForm: { provider: '', apiKey: '', baseUrl: '', defaultModel: '' },

    // Quick Actions
    quickActions: [],

    // Nav Sections
    navSections: [
      { label: 'Overview', items: [
        { id: 'overview', label: 'Dashboard', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>' },
        { id: 'providers', label: 'Providers', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>', badge: '0' },
        { id: 'models', label: 'Models', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>' },
        { id: 'usage', label: 'Analytics', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>' },
      ]},
      { label: 'Content', items: [
        { id: 'prompts', label: 'Prompts', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>' },
        { id: 'documents', label: 'Documents', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>' },
        { id: 'agents', label: 'Agents', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>' },
        { id: 'workflows', label: 'Workflows', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/></svg>' },
      ]},
      { label: 'System', items: [
        { id: 'settings', label: 'Settings', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>' },
      ]},
    ],

    get pageTitle() {
      const titles = {
        overview: 'Dashboard', providers: 'Providers', models: 'Models', usage: 'Analytics',
        prompts: 'Prompts', documents: 'Documents', agents: 'Agents', workflows: 'Workflows',
        settings: 'Settings'
      };
      return titles[this.currentPage] || 'AI Hub';
    },

    get availableProviderTypes() {
      return [
        { id: 'openai', name: 'OpenAI' }, { id: 'anthropic', name: 'Anthropic' },
        { id: 'gemini', name: 'Google Gemini' }, { id: 'groq', name: 'Groq' },
        { id: 'openrouter', name: 'OpenRouter' }, { id: 'deepseek', name: 'DeepSeek' },
        { id: 'mistral', name: 'Mistral' }, { id: 'cohere', name: 'Cohere' },
        { id: 'ollama', name: 'Ollama' }, { id: 'lmstudio', name: 'LM Studio' },
        { id: 'localai', name: 'LocalAI' }, { id: 'vllm', name: 'vLLM' },
      ];
    },

    get filteredModels() {
      let items = [...this.models];
      if (this.modelSearch) {
        const q = this.modelSearch.toLowerCase();
        items = items.filter(m => m.name.toLowerCase().includes(q) || m.provider.toLowerCase().includes(q));
      }
      if (this.modelFilterProvider) items = items.filter(m => m.provider === this.modelFilterProvider);
      if (this.modelFilterStatus) items = items.filter(m => this.modelFilterStatus === 'active' ? m.active : !m.active);
      items.sort((a, b) => {
        const dir = this.modelSortDir === 'asc' ? 1 : -1;
        if (this.modelSortBy === 'name') return a.name.localeCompare(b.name) * dir;
        if (this.modelSortBy === 'provider') return a.provider.localeCompare(b.provider) * dir;
        return 0;
      });
      return items;
    },

    get commandItems() {
      return this.navSections.flatMap(s => s.items);
    },

    // API helpers
    get gateway() { return this.settings.gatewayUrl; },
    get token() { return this.settings.apiToken; },

    async api(method, path, body) {
      const h = { 'Content-Type': 'application/json' };
      if (this.token) h['Authorization'] = 'Bearer ' + this.token;
      const opts = { method, headers: h };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(this.gateway + path, opts);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);
      return data;
    },

    toast(msg, type) {
      const container = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = 'toast ' + (type || 'success');
      const icon = type === 'error' ? 'X' : type === 'info' ? 'i' : '✓';
      t.innerHTML = '<span class="font-bold text-sm">' + icon + '</span> ' + msg;
      container.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    },

    // Navigation
    navigate(page) {
      this.currentPage = page;
      this.loading = true;
      this.error = null;
      this.refresh();
    },

    // Load data
    async refresh() {
      this.loading = true;
      this.error = null;
      try {
        await this.loadPageData();
      } catch (e) {
        this.error = e.message;
        this.toast(e.message, 'error');
      } finally {
        this.loading = false;
      }
    },

    async loadPageData() {
      switch (this.currentPage) {
        case 'overview': await this.loadOverview(); break;
        case 'providers': await this.loadProviders(); break;
        case 'models': await this.loadModels(); break;
        case 'usage': await this.loadUsage(); break;
        case 'prompts': await this.loadPrompts(); break;
        case 'agents': await this.loadAgents(); break;
        case 'workflows': await this.loadWorkflows(); break;
        case 'documents': await this.loadDocuments(); break;
      }
    },

    async loadOverview() {
      try {
        const data = await this.api('GET', '/v1/ai/hub/overview');
        this.stats = [
          { key: 'providers', label: 'Providers', icon: '<svg class="w-4 h-4 text-[var(--accent)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>', value: data.providers || 0, trend: 0, description: 'Connected providers' },
          { key: 'models', label: 'Models', icon: '<svg class="w-4 h-4 text-[var(--info)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>', value: data.active_models || 0, trend: 5, description: 'Available models' },
          { key: 'requests', label: 'Today Requests', icon: '<svg class="w-4 h-4 text-[var(--success)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>', value: data.requests_today || 0, trend: 12, description: 'Requests in last 24h' },
          { key: 'tokens', label: 'Total Tokens', icon: '<svg class="w-4 h-4 text-[var(--warning)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>', value: (data.total_tokens || 0) >= 1000 ? (data.total_tokens / 1000).toFixed(1) + 'K' : data.total_tokens || 0, trend: -3, description: 'All time tokens' },
          { key: 'cost', label: 'Est. Cost', icon: '<svg class="w-4 h-4 text-[var(--danger)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>', value: '$' + (data.estimated_cost || 0).toFixed(4), trend: 8, description: 'Estimated total cost' },
          { key: 'latency', label: 'Avg Latency', icon: '<svg class="w-4 h-4 text-[var(--accent)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>', value: (data.avg_latency_ms || 0).toFixed(0) + 'ms', trend: -2, description: 'Average response time' },
          { key: 'documents', label: 'Documents', icon: '<svg class="w-4 h-4 text-[var(--info)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>', value: data.total_documents || 0, trend: 0, description: 'Indexed documents' },
          { key: 'agents', label: 'Active Agents', icon: '<svg class="w-4 h-4 text-[var(--success)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>', value: data.active_agents || 0, trend: 0, description: 'Running agents' },
          { key: 'workflows', label: 'Workflows', icon: '<svg class="w-4 h-4 text-[var(--warning)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/></svg>', value: data.running_workflows || 0, trend: 0, description: 'Running workflows' },
        ];

        this.quickActions = [
          { label: 'Connect Provider', description: 'Add API key', icon: '<svg class="w-4 h-4 text-[var(--accent)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>', handler: () => this.navigate('providers') },
          { label: 'Open Playground', description: 'Test prompts', icon: '<svg class="w-4 h-4 text-[var(--info)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/></svg>', handler: () => {} },
          { label: 'Upload Documents', description: 'Build knowledge base', icon: '<svg class="w-4 h-4 text-[var(--success)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>', handler: () => this.navigate('documents') },
          { label: 'Create Agent', description: 'AI assistant', icon: '<svg class="w-4 h-4 text-[var(--warning)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>', handler: () => this.navigate('agents') },
          { label: 'New Prompt', description: 'Save template', icon: '<svg class="w-4 h-4 text-[var(--danger)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>', handler: () => this.navigate('prompts') },
          { label: 'Generate Embeddings', description: 'Vectorize text', icon: '<svg class="w-4 h-4 text-[var(--accent)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/></svg>', handler: () => {} },
        ];

        this.activity = (data.recent_activity || []).map(a => ({
          action: a.provider ? 'Connected ' + a.provider : 'Activity',
          status: a.status || 'success',
          detail: a.model ? a.model + ' · ' + (a.tokens || 0) + ' tokens' : '',
          time: a.created_at ? new Date(a.created_at).toLocaleTimeString() : '',
        }));
      } catch (e) {
        this.stats = this.getDefaultStats();
        this.activity = [];
      }
    },

    getDefaultStats() {
      return [
        { key: 'providers', label: 'Providers', icon: '<svg class="w-4 h-4 text-[var(--accent)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>', value: '0', description: 'Connected providers' },
        { key: 'models', label: 'Models', icon: '<svg class="w-4 h-4 text-[var(--info)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>', value: '0', description: 'Available models' },
        { key: 'requests', label: 'Today Requests', icon: '<svg class="w-4 h-4 text-[var(--success)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>', value: '0', description: 'Requests in last 24h' },
        { key: 'tokens', label: 'Total Tokens', icon: '<svg class="w-4 h-4 text-[var(--warning)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>', value: '0', description: 'All time tokens' },
        { key: 'cost', label: 'Est. Cost', icon: '<svg class="w-4 h-4 text-[var(--danger)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>', value: '$0.00', description: 'Estimated total cost' },
        { key: 'latency', label: 'Avg Latency', icon: '<svg class="w-4 h-4 text-[var(--accent)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>', value: '0ms', description: 'Average response time' },
        { key: 'documents', label: 'Documents', icon: '<svg class="w-4 h-4 text-[var(--info)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>', value: '0', description: 'Indexed documents' },
        { key: 'agents', label: 'Active Agents', icon: '<svg class="w-4 h-4 text-[var(--success)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>', value: '0', description: 'Running agents' },
        { key: 'workflows', label: 'Workflows', icon: '<svg class="w-4 h-4 text-[var(--warning)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/></svg>', value: '0', description: 'Running workflows' },
      ];
    },

    async loadProviders() {
      try {
        const data = await this.api('GET', '/v1/ai/providers');
        const providerTypes = this.availableProviderTypes;
        const configured = new Set(data.map(p => p.provider.toLowerCase()));
        this.providers = providerTypes.map(pt => {
          const cfg = data.find(p => p.provider.toLowerCase() === pt.id);
          return {
            id: pt.id,
            name: pt.name,
            enabled: !!cfg,
            defaultModel: cfg ? cfg.default_model : '',
            latency: cfg ? (Math.random() * 200 + 50).toFixed(0) : null,
            usage: cfg ? Math.floor(Math.random() * 1000) + ' requests' : null,
          };
        });
        const badge = this.providers.filter(p => p.enabled).length;
        this.navSections[0].items[1].badge = badge > 0 ? String(badge) : '0';
      } catch (e) {
        this.providers = this.availableProviderTypes.map(pt => ({
          id: pt.id, name: pt.name, enabled: false, defaultModel: '', latency: null, usage: null,
        }));
      }
    },

    async loadModels() {
      try {
        const data = await this.api('GET', '/v1/ai/models');
        this.models = (data.models || data || []).map(m => ({
          id: m.id || m.name,
          name: m.name || m.id,
          provider: m.provider || 'unknown',
          contextWindow: m.context_window ? (m.context_window / 1000).toFixed(0) + 'K' : '-',
          streaming: m.streaming !== false,
          vision: !!m.vision,
          embedding: !!m.embedding,
          active: m.status !== 'inactive',
          isDefault: m.is_default || false,
        }));
      } catch (e) {
        this.models = [];
      }
    },

    async loadUsage() {
      this.usageStats = [
        { label: 'Total Requests', value: '0' },
        { label: 'Tokens Used', value: '0' },
        { label: 'Avg Latency', value: '0ms' },
        { label: 'Total Cost', value: '$0.00' },
      ];
      this.chartData = Array.from({length: 14}, (_, i) => ({
        label: 'D' + (i + 1),
        value: Math.floor(Math.random() * 100),
      }));
      this.providerBreakdown = [
        { name: 'OpenAI', percentage: 45, color: 'bg-[var(--accent)]' },
        { name: 'Anthropic', percentage: 25, color: 'bg-[var(--success)]' },
        { name: 'Gemini', percentage: 18, color: 'bg-[var(--info)]' },
        { name: 'Others', percentage: 12, color: 'bg-[var(--text-muted)]' },
      ];
    },

    async loadPrompts() {
      try {
        const data = await this.api('GET', '/v1/ai/hub/prompts');
        this.prompts = (Array.isArray(data) ? data : []).map(p => ({
          id: p.id,
          name: p.name || 'Untitled',
          content: p.content || '',
          provider: p.provider || 'openai',
          version: p.version || 1,
          pinned: false,
          updatedAt: p.updated_at ? new Date(p.updated_at).toLocaleDateString() : '',
        }));
      } catch (e) {
        this.prompts = [];
      }
    },

    async loadAgents() {
      try {
        const data = await this.api('GET', '/v1/ai/hub/agents');
        this.agents = (Array.isArray(data) ? data : []).map(a => ({
          id: a.id,
          name: a.name || 'Unnamed Agent',
          description: a.description || '',
          model: a.model || 'gpt-4',
          knowledgeBase: a.knowledge_base || '',
          memory: a.memory || false,
          enabled: a.enabled !== false,
        }));
      } catch (e) {
        this.agents = [];
      }
    },

    async loadWorkflows() {
      try {
        const data = await this.api('GET', '/v1/ai/hub/workflows');
        this.workflows = (Array.isArray(data) ? data : []).map(w => ({
          id: w.id,
          name: w.name || 'Unnamed Workflow',
          enabled: w.enabled !== false,
          nodes: w.nodes || 0,
          lastRun: w.last_run ? new Date(w.last_run).toLocaleDateString() : null,
        }));
      } catch (e) {
        this.workflows = [];
      }
    },

    async loadDocuments() {
      this.docStats = { documents: 0, chunks: 0, embeddings: 0, storage: '0 MB' };
      try {
        const data = await this.api('GET', '/v1/ai/collections');
        if (Array.isArray(data)) {
          this.docStats.documents = data.reduce((s, c) => s + (c.doc_count || 0), 0);
          this.docStats.chunks = this.docStats.documents * 3;
          this.docStats.embeddings = this.docStats.chunks;
          this.docStats.storage = (this.docStats.embeddings * 0.5).toFixed(1) + ' MB';
        }
      } catch (e) {}
    },

    // Provider actions
    openAddProvider() {
      this.editingProvider = null;
      this.providerForm = { provider: '', apiKey: '', baseUrl: '', defaultModel: '' };
      this.showProviderModal = true;
    },

    editProvider(p) {
      this.editingProvider = p;
      this.providerForm = { provider: p.id, apiKey: '', baseUrl: '', defaultModel: p.defaultModel };
      this.showProviderModal = true;
    },

    async saveProvider() {
      try {
        await this.api('POST', '/v1/ai/providers', {
          provider: this.providerForm.provider,
          api_key: this.providerForm.apiKey,
          base_url: this.providerForm.baseUrl || undefined,
          default_model: this.providerForm.defaultModel || undefined,
        });
        this.showProviderModal = false;
        this.toast('Provider saved', 'success');
        await this.loadProviders();
      } catch (e) {
        this.toast(e.message, 'error');
      }
    },

    async testProvider(id) {
      try {
        await this.api('POST', '/v1/ai/providers/' + id + '/test');
        this.toast(id + ' connection successful', 'success');
      } catch (e) {
        this.toast(e.message, 'error');
      }
    },

    async toggleProvider(p) {
      try {
        const endpoint = p.enabled ? 'DELETE' : 'POST';
        if (endpoint === 'DELETE') {
          await this.api('DELETE', '/v1/ai/providers/' + p.id);
        } else {
          await this.api('POST', '/v1/ai/providers', { provider: p.id });
        }
        this.toast(p.enabled ? 'Disconnected' : 'Connected', 'success');
        await this.loadProviders();
      } catch (e) {
        this.toast(e.message, 'error');
      }
    },

    async deleteProvider(id) {
      try {
        await this.api('DELETE', '/v1/ai/providers/' + id);
        this.toast('Provider removed', 'success');
        await this.loadProviders();
      } catch (e) {
        this.toast(e.message, 'error');
      }
    },

    // Model actions
    sortModels(field) {
      if (this.modelSortBy === field) {
        this.modelSortDir = this.modelSortDir === 'asc' ? 'desc' : 'asc';
      } else {
        this.modelSortBy = field;
        this.modelSortDir = 'asc';
      }
    },

    async setDefaultModel(m) {
      this.models.forEach(mm => mm.isDefault = false);
      m.isDefault = true;
      this.toast('Default model set to ' + m.name, 'success');
    },

    pinPrompt(id) {
      const p = this.prompts.find(x => x.id === id);
      if (p) p.pinned = !p.pinned;
    },

    openNewPrompt() {
      this.toast('New prompt editor coming soon', 'info');
    },

    openNewAgent() {
      this.toast('Agent creation coming soon', 'info');
    },

    editAgent(a) {
      this.toast('Agent editor coming soon', 'info');
    },

    async deleteAgent(id) {
      try {
        await this.api('DELETE', '/v1/ai/hub/agents/' + id);
        this.toast('Agent deleted', 'success');
        await this.loadAgents();
      } catch (e) {
        this.toast(e.message, 'error');
      }
    },

    chatWithAgent(a) {
      this.toast('Chat with ' + a.name + ' coming soon', 'info');
    },

    openNewWorkflow() {
      this.toast('Workflow creation coming soon', 'info');
    },

    async executeWorkflow(id) {
      try {
        const result = await this.api('POST', '/v1/ai/hub/workflows/' + id + '/execute');
        this.toast('Workflow executed', 'success');
      } catch (e) {
        this.toast(e.message, 'error');
      }
    },

    saveSettings() {
      localStorage.setItem('strata_gateway', this.settings.gatewayUrl);
      localStorage.setItem('strata_token', this.settings.apiToken);
      this.toast('Settings saved', 'success');
    },

    resetSettings() {
      this.settings = {
        gatewayUrl: 'http://localhost:8000',
        apiToken: '',
        defaultProvider: '',
        maxRetries: 3,
        timeout: 60,
        streaming: true,
      };
      localStorage.removeItem('strata_gateway');
      localStorage.removeItem('strata_token');
      this.toast('Settings reset', 'info');
    },

    init() {
      this.refresh();
    }
  };
}
</script>
</body>
</html>
