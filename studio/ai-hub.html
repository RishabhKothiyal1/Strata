<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hub — Strata Studio</title>
<script src="https://cdn.tailwindcss.com">
</script>
<script src="https://unpkg.com/lucide@latest">
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js">
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg-primary:#09090B;
--bg-secondary:#111113;
--bg-card:#18181B;
--bg-elevated:#202024;
--bg-sidebar:#101012;
--border:rgba(255,255,255,0.06);
--text-primary:#FAFAFA;
--text-secondary:#A1A1AA;
--text-muted:#71717A;
--accent:#6366F1;
--accent-hover:#818CF8;
--success:#22C55E;
--warning:#F59E0B;
--danger:#EF4444;
--info:#3B82F6;
--radius:12px;
--radius-sm:8px;
--radius-xs:6px;
--shadow-sm:0 1px 2px rgba(0,0,0,0.3);
--shadow-md:0 4px 16px rgba(0,0,0,0.4);
--shadow-lg:0 8px 32px rgba(0,0,0,0.5);
--transition:200ms cubic-bezier(0.16,1,0.3,1);
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15)}
::selection{background:rgba(99,102,241,0.3);color:#fff}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:200% 0}to{background-position:-200% 0}}
@keyframes countUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOutRight{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}
.animate-fade-in{animation:fadeIn 300ms var(--transition) forwards}
.animate-slide-up{animation:slideUp 400ms var(--transition) forwards}
.animate-scale-in{animation:scaleIn 200ms var(--transition) forwards}
.skeleton{background:linear-gradient(90deg,var(--bg-card) 25%,var(--bg-elevated) 50%,var(--bg-card) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--radius-xs)}
.skeleton-card{height:96px;border-radius:var(--radius)}
.skeleton-line{height:14px;margin-bottom:8px;border-radius:4px;width:60%}
.page-enter{animation:fadeIn 250ms var(--transition) forwards}
.card-hover{transition:all var(--transition)}.card-hover:hover{transform:translateY(-2px);border-color:rgba(99,102,241,0.2);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.stat-value{font-feature-settings:'tnum';letter-spacing:-0.02em}
.chart-bar{transition:height 600ms cubic-bezier(0.16,1,0.3,1)}
.timeline-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;position:relative}
.timeline-dot::after{content:'';position:absolute;top:8px;left:3.5px;width:1px;height:calc(100% + 8px);background:var(--border)}
.timeline-item:last-child .timeline-dot::after{display:none}
.pulse-dot{animation:pulse-dot 2s ease-in-out infinite}
input[type="text"],input[type="search"],input[type="number"],input[type="password"],select,textarea{background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);border-radius:var(--radius-xs);padding:8px 12px;font-size:13px;transition:border-color var(--transition),box-shadow var(--transition);width:100%;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
textarea{resize:vertical;min-height:80px}
label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:4px;font-weight:500}
.sidebar-transition{transition:width 300ms var(--transition)}
.panel-transition{transition:transform 300ms var(--transition),opacity 300ms var(--transition)}
.tab-underline{position:relative}.tab-underline::after{content:'';position:absolute;bottom:-1px;left:0;width:100%;height:2px;background:var(--accent);border-radius:1px;transform:scaleX(0);transition:transform var(--transition)}.tab-underline.active::after{transform:scaleX(1)}
.provider-logo{width:36px;height:36px;border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-dot.connected{background:var(--success);box-shadow:0 0 6px rgba(34,197,94,0.3)}
.status-dot.disconnected{background:var(--text-muted)}
.status-dot.error{background:var(--danger);box-shadow:0 0 6px rgba(239,68,68,0.3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-xs);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all var(--transition);white-space:nowrap;font-family:inherit;line-height:1.4}
.btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(0)}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover);box-shadow:0 4px 12px rgba(99,102,241,0.25)}
.btn-secondary{background:var(--bg-elevated);color:var(--text-primary);border:1px solid var(--border)}.btn-secondary:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1)}
.btn-ghost{background:transparent;color:var(--text-secondary)}.btn-ghost:hover{background:rgba(255,255,255,0.05);color:var(--text-primary)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{box-shadow:0 4px 12px rgba(239,68,68,0.25)}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{box-shadow:0 4px 12px rgba(34,197,94,0.25)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-lg{padding:10px 20px;font-size:14px}
.btn-icon{padding:6px;border-radius:var(--radius-xs);background:transparent;border:none;color:var(--text-secondary);cursor:pointer;transition:all var(--transition);display:inline-flex;align-items:center;justify-content:center}
.btn-icon:hover{background:rgba(255,255,255,0.05);color:var(--text-primary)}
.badge{padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;display:inline-flex;align-items:center;gap:4px;line-height:1.4}
.badge-accent{background:rgba(99,102,241,0.12);color:var(--accent)}
.badge-success{background:rgba(34,197,94,0.12);color:var(--success)}
.badge-warning{background:rgba(245,158,11,0.12);color:var(--warning)}
.badge-danger{background:rgba(239,68,68,0.12);color:var(--danger)}
.badge-info{background:rgba(59,130,246,0.12);color:var(--info)}
.badge-neutral{background:rgba(255,255,255,0.06);color:var(--text-secondary)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 14px;text-align:left;color:var(--text-muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);user-select:none;cursor:pointer;transition:color var(--transition)}
th:hover{color:var(--text-secondary)}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text-primary)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.grid-small{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{pointer-events:auto;padding:10px 16px;border-radius:var(--radius-xs);font-size:13px;font-weight:500;animation:slideUp 300ms var(--transition);box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px;min-width:280px;max-width:400px}
.toast.success{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.2);color:var(--success)}
.toast.error{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.2);color:var(--danger)}
.toast.info{background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.2);color:var(--accent)}
@keyframes modalOverlay{from{opacity:0}to{opacity:1}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:modalOverlay 200ms ease}
.modal-overlay.active{display:flex}
.modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:520px;max-width:92vw;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:scaleIn 200ms var(--transition)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h3{font-size:16px;font-weight:600}
.dropdown{position:relative;display:inline-block}
.dropdown-menu{position:absolute;top:calc(100% + 4px);right:0;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px;min-width:160px;box-shadow:var(--shadow-lg);z-index:500;animation:scaleIn 150ms var(--transition);display:none}
.dropdown-menu.active{display:block}
.dropdown-item{padding:7px 12px;font-size:13px;color:var(--text-secondary);cursor:pointer;border-radius:var(--radius-xs);transition:all var(--transition);display:flex;align-items:center;gap:8px}
.dropdown-item:hover{background:rgba(255,255,255,0.05);color:var(--text-primary)}
.dropdown-divider{height:1px;background:var(--border);margin:4px 0}
@media(max-width:1024px){.sidebar-collapsed .sidebar{width:56px;min-width:56px}.sidebar-collapsed .sidebar .sidebar-label,.sidebar-collapsed .sidebar .sidebar-badge,.sidebar-collapsed .sidebar .sidebar-header-text,.sidebar-collapsed .sidebar .sidebar-section{display:none}.sidebar-collapsed .sidebar .nav-item{justify-content:center;padding:10px}.sidebar-collapsed .sidebar .sidebar-logo-text{display:none}}
@media(max-width:768px){.sidebar{width:56px;min-width:56px}.sidebar-label,.sidebar-badge,.sidebar-header-text,.sidebar-section{display:none}.nav-item{justify-content:center;padding:10px}.sidebar-logo-text{display:none}.right-panel{display:none}.grid-cards{grid-template-columns:1fr}.grid-small{grid-template-columns:1fr 1fr}.main-header{padding:12px 16px}.main-content{padding:16px}.hide-mobile{display:none!important}}
@media(max-width:480px){.grid-small{grid-template-columns:1fr}.quick-actions-grid{grid-template-columns:1fr!important}.stat-grid{grid-template-columns:1fr 1fr!important}}
</style>
</head>
<body>

<div x-data="app()" class="flex h-screen overflow-hidden" :class="{'sidebar-collapsed': sidebarCollapsed}">

  <!-- Sidebar -->
  <aside class="sidebar w-56 min-w-[224px] bg-[#101012] border-r border-[var(--border)] flex flex-col overflow-hidden transition-all duration-300" style="width:224px;min-width:224px">
    <div class="flex items-center gap-3 px-5 py-4 border-b border-[var(--border)]">
      <div class="w-7 h-7 rounded-md bg-[var(--accent)] flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <div class="sidebar-header-text">
        <div class="text-sm font-semibold text-[var(--text-primary)]">AI Hub</div>
        <div class="text-[10px] text-[var(--text-muted)] tracking-wider uppercase">Strata Studio</div>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto px-2 py-3 space-y-0.5">
      <template x-for="section in navSections" :key="section.label">
        <div>
          <div class="sidebar-section text-[10px] text-[var(--text-muted)] uppercase tracking-wider px-3 pt-4 pb-1.5 font-medium" x-text="section.label"></div>
          <template x-for="item in section.items" :key="item.id">
            <a href="#" class="nav-item flex items-center gap-3 px-3 py-2 rounded-md text-sm transition-all duration-150"
               :class="currentPage === item.id ? 'bg-[var(--accent)]/10 text-[var(--accent)] font-medium' : 'text-[var(--text-secondary)] hover:bg-white/[0.03] hover:text-[var(--text-primary)]'"
               @click.prevent="navigate(item.id)">
              <span x-html="item.icon" class="w-5 h-5 flex-shrink-0 flex items-center justify-center"></span>
              <span class="sidebar-label flex-1 truncate" x-text="item.label"></span>
              <span x-show="item.badge" class="sidebar-badge text-[10px] px-1.5 py-0.5 rounded-full bg-[var(--accent)]/15 text-[var(--accent)] font-medium" x-text="item.badge"></span>
            </a>
          </template>
        </div>
      </template>
    </nav>

    <div class="border-t border-[var(--border)] px-2 py-3">
      <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm text-[var(--text-secondary)] hover:bg-white/[0.03] hover:text-[var(--text-primary)] transition-all duration-150"
         @click.prevent="navigate('settings')">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <span class="sidebar-label">Settings</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">
    <!-- Header -->
    <header class="flex items-center justify-between px-6 py-3 border-b border-[var(--border)] bg-[var(--bg-primary)]/80 backdrop-blur-lg" style="min-height:52px">
      <div class="flex items-center gap-4">
        <button class="btn-icon lg:hidden" @click="sidebarCollapsed = !sidebarCollapsed">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div>
          <h1 class="text-base font-semibold text-[var(--text-primary)]" x-text="pageTitle"></h1>
          <p class="text-xs text-[var(--text-muted)] hidden sm:block">Manage providers, models, agents and AI infrastructure.</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <div class="relative hide-mobile">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-[var(--text-muted)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" placeholder="Search..." class="pl-9 pr-3 py-1.5 text-xs w-48 bg-[var(--bg-card)] border border-[var(--border)] rounded-md text-[var(--text-primary)] placeholder-[var(--text-muted)] outline-none focus:border-[var(--accent)] transition-colors" @focus="showCommandPalette = true">
        </div>
        <button class="btn-icon" @click="showCommandPalette = true" title="Command Palette (Cmd+K)">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </button>
        <button class="btn-icon" @click="refresh()" title="Refresh">
          <svg class="w-4 h-4" :class="{'animate-spin': loading}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </button>
        <button class="btn-icon" @click="navigate('settings')" title="Settings">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
        <div class="w-7 h-7 rounded-full bg-[var(--accent)]/20 flex items-center justify-center text-xs font-medium text-[var(--accent)] cursor-pointer" title="User">RK</div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto px-6 py-5 space-y-6 page-enter" id="page-content" x-show="!loading && !error">
      <!-- Overview Section -->
      <template x-if="currentPage === 'overview'">
        <div class="space-y-6">
          <!-- Stats Grid -->
          <div class="stat-grid grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">
            <template x-for="stat in stats" :key="stat.key">
              <div class="card-hover bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-4 transition-all duration-200">
                <div class="flex items-center gap-3 mb-3">
                  <div class="w-8 h-8 rounded-lg bg-[var(--accent)]/10 flex items-center justify-center" x-html="stat.icon"></div>
                  <span class="text-[10px] font-medium text-[var(--text-muted)] uppercase tracking-wider" x-text="stat.label"></span>
                </div>
                <div class="flex items-baseline gap-2">
                  <span class="stat-value text-2xl font-bold text-[var(--text-primary)]" x-text="stat.value"></span>
                  <span class="text-[10px] font-medium" :class="stat.trend > 0 ? 'text-[var(--success)]' : stat.trend < 0 ? 'text-[var(--danger)]' : 'text-[var(--text-muted)]'" x-show="stat.trend !== undefined" x-text="(stat.trend > 0 ? '+' : '') + stat.trend + '%'"></span>
                </div>
                <p class="text-[11px] text-[var(--text-muted)] mt-1" x-text="stat.description"></p>
              </div>
            </template>
          </div>

          <!-- Quick Actions -->
          <div>
            <div class="flex items-center justify-between mb-3">
              <h2 class="text-sm font-semibold text-[var(--text-primary)]">Quick Actions</h2>
            </div>
            <div class="quick-actions-grid grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
              <template x-for="action in quickActions" :key="action.label">
                <button class="card-hover bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-4 text-left transition-all duration-200 hover:border-[var(--accent)]/30 group"
                        @click="action.handler">
                  <div class="w-9 h-9 rounded-lg bg-[var(--bg-elevated)] flex items-center justify-center mb-3 group-hover:bg-[var(--accent)]/10 transition-colors" x-html="action.icon"></div>
                  <span class="text-sm font-medium text-[var(--text-primary)] group-hover:text-[var(--accent)] transition-colors" x-text="action.label"></span>
                  <p class="text-[10px] text-[var(--text-muted)] mt-0.5" x-text="action.description"></p>
                </button>
              </template>
            </div>
          </div>

          <!-- Recent Activity -->
          <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-5">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-sm font-semibold text-[var(--text-primary)]">Recent Activity</h2>
              <button class="text-xs text-[var(--text-muted)] hover:text-[var(--text-secondary)] transition-colors">View all</button>
            </div>
            <div class="space-y-0" x-show="activity.length > 0">
              <template x-for="(item, i) in activity.slice(0, 8)" :key="i">
                <div class="timeline-item flex items-start gap-3 py-2.5 border-b border-[var(--border)] last:border-b-0">
                  <div class="timeline-dot" :class="item.status === 'success' ? 'bg-[var(--success)]' : item.status === 'error' ? 'bg-[var(--danger)]' : 'bg-[var(--text-muted)]'"></div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                      <span class="text-xs font-medium text-[var(--text-primary)]" x-text="item.action"></span>
                      <span class="text-[10px] badge" :class="item.status === 'success' ? 'badge-success' : item.status === 'error' ? 'badge-danger' : 'badge-neutral'" x-text="item.status"></span>
                    </div>
                    <p class="text-[11px] text-[var(--text-muted)] truncate" x-text="item.detail"></p>
                  </div>
                  <span class="text-[10px] text-[var(--text-muted)] whitespace-nowrap flex-shrink-0" x-text="item.time"></span>
                </div>
              </template>
            </div>
            <div x-show="activity.length === 0" class="text-center py-8">
              <svg class="w-10 h-10 text-[var(--text-muted)] mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <p class="text-xs text-[var(--text-muted)]">No recent activity</p>
            </div>
          </div>
        </div>
      </template>

      <!-- Providers Section -->
      <template x-if="currentPage === 'providers'">
        <div class="space-y-4">
          <div class="flex items-center justify-between">
            <p class="text-xs text-[var(--text-muted)]"><span x-text="providers.filter(p => p.enabled).length"></span> connected · <span x-text="providers.length"></span> total</p>
            <button class="btn btn-primary btn-sm" @click="openAddProvider()">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              Add Provider
            </button>
          </div>
          <div class="grid-cards">
            <template x-for="p in providers" :key="p.id">
              <div class="card-hover bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-4 transition-all duration-200">
                <div class="flex items-start justify-between mb-3">
                  <div class="flex items-center gap-3">
                    <div class="provider-logo bg-[var(--bg-elevated)]" x-text="p.name.charAt(0).toUpperCase()"></div>
                    <div>
                      <div class="text-sm font-medium text-[var(--text-primary)]" x-text="p.name"></div>
                      <div class="flex items-center gap-1.5 mt-0.5">
                        <span class="status-dot" :class="p.enabled ? 'connected' : 'disconnected'"></span>
                        <span class="text-[10px]" :class="p.enabled ? 'text-[var(--success)]' : 'text-[var(--text-muted)]'" x-text="p.enabled ? 'Connected' : 'Disconnected'"></span>
                      </div>
                    </div>
                  </div>
                  <div class="dropdown" x-data="{ open: false }">
                    <button class="btn-icon" @click="open = !open" @click.outside="open = false">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/></svg>
                    </button>
                    <div class="dropdown-menu" :class="{'active': open}" style="right:0">
                      <div class="dropdown-item" @click="open = false; testProvider(p.id)">Test Connection</div>
                      <div class="dropdown-item" @click="open = false; editProvider(p)">Edit</div>
                      <div class="dropdown-divider"></div>
                      <div class="dropdown-item text-[var(--danger)]" @click="open = false; toggleProvider(p)">
                        <span x-text="p.enabled ? 'Disable' : 'Enable'"></span>
                      </div>
                      <div class="dropdown-item text-[var(--danger)]" @click="open = false; deleteProvider(p.id)">Remove</div>
                    </div>
                  </div>
                </div>
                <div class="space-y-1.5">
                  <div class="flex justify-between text-xs"><span class="text-[var(--text-muted)]">Model</span><span class="text-[var(--text-secondary)]" x-text="p.defaultModel || '-'"></span></div>
                  <div class="flex justify-between text-xs"><span class="text-[var(--text-muted)]">Latency</span><span class="text-[var(--text-secondary)]" x-text="p.latency ? p.latency + 'ms' : '-'"></span></div>
                  <div class="flex justify-between text-xs"><span class="text-[var(--text-muted)]">Usage</span><span class="text-[var(--text-secondary)]" x-text="p.usage || '0 requests'"></span></div>
                </div>
                <div class="flex gap-2 mt-3 pt-3 border-t border-[var(--border)]">
                  <button class="btn btn-secondary btn-sm flex-1" @click="testProvider(p.id)">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Test
                  </button>
                  <button class="btn btn-sm flex-1" :class="p.enabled ? 'btn-danger' : 'btn-success'" @click="toggleProvider(p)">
                    <span x-text="p.enabled ? 'Disconnect' : 'Connect'"></span>
                  </button>
                </div>
              </div>
            </template>
            <!-- Add Provider Card -->
            <button class="card-hover bg-[var(--bg-card)] border border-dashed border-[var(--border)] rounded-xl p-4 text-center transition-all duration-200 hover:border-[var(--accent)]/30 flex flex-col items-center justify-center gap-2 min-h-[180px]" @click="openAddProvider()">
              <svg class="w-8 h-8 text-[var(--text-muted)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"/></svg>
              <span class="text-sm font-medium text-[var(--text-secondary)]">Add Provider</span>
              <span class="text-[10px] text-[var(--text-muted)]">Connect OpenAI, Anthropic, Gemini & more</span>
            </button>
          </div>
        </div>
      </template>

      <!-- Models Section -->
      <template x-if="currentPage === 'models'">
        <div class="space-y-4">
          <div class="flex items-center justify-between gap-3 flex-wrap">
            <div class="relative flex-1 max-w-xs">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-[var(--text-muted)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input type="text" placeholder="Search models..." class="pl-9 pr-3 py-1.5 text-xs w-full bg-[var(--bg-card)] border border-[var(--border)] rounded-md text-[var(--text-primary)] placeholder-[var(--text-muted)] outline-none focus:border-[var(--accent)]" x-model="modelSearch">
            </div>
            <div class="flex gap-2">
              <select class="text-xs py-1.5 px-3 bg-[var(--bg-card)] border border-[var(--border)] rounded-md text-[var(--text-primary)] outline-none focus:border-[var(--accent)]" x-model="modelFilterProvider">
                <option value="">All Providers</option>
                <template x-for="p in providers" :key="p.id"><option :value="p.id" x-text="p.name"></option></template>
              </select>
              <select class="text-xs py-1.5 px-3 bg-[var(--bg-card)] border border-[var(--border)] rounded-md text-[var(--text-primary)] outline-none focus:border-[var(--accent)]" x-model="modelFilterStatus">

                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
          </div>
          <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-xl overflow-hidden">
            <div class="overflow-x-auto">
              <table>
                <thead>
                  <tr class="border-b border-[var(--border)]">
                    <th @click="sortModels('name')" class="cursor-pointer hover:text-[var(--text-secondary)]">Model <span x-show="modelSortBy === 'name'" x-text="modelSortDir === 'asc' ? '▲' : '▼'" class="text-[10px]"></span></th>
                    <th @click="sortModels('provider')" class="cursor-pointer hover:text-[var(--text-secondary)]">Provider <span x-show="modelSortBy === 'provider'" x-text="modelSortDir === 'asc' ? '▲' : '▼'" class="text-[10px]"></span></th>
                    <th class="hide-mobile">Context</th>
                    <th class="hide-mobile">Streaming</th>
                    <th class="hide-mobile">Vision</th>
                    <th class="hide-mobile">Embedding</th>
                    <th>Status</th>
                    <th class="text-right">Default</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="m in filteredModels" :key="m.id">
                    <tr class="transition-colors">
                      <td class="font-medium text-sm" x-text="m.name"></td>
                      <td><span class="text-xs text-[var(--text-secondary)]" x-text="m.provider"></span></td>
                      <td class="hide-mobile text-xs text-[var(--text-secondary)]" x-text="m.contextWindow || '-'"></td>
                      <td class="hide-mobile"><span class="badge" :class="m.streaming ? 'badge-success' : 'badge-neutral'" x-text="m.streaming ? 'Yes' : 'No'"></span></td>
                      <td class="hide-mobile"><span class="badge" :class="m.vision ? 'badge-success' : 'badge-neutral'" x-text="m.vision ? 'Yes' : 'No'"></span></td>
                      <td class="hide-mobile"><span class="badge" :class="m.embedding ? 'badge-info' : 'badge-neutral'" x-text="m.embedding ? 'Yes' : 'No'"></span></td>
                      <td><span class="badge" :class="m.active ? 'badge-success' : 'badge-neutral'" x-text="m.active ? 'Active' : 'Inactive'"></span></td>
                      <td class="text-right">
                        <button class="btn btn-ghost btn-sm" @click="setDefaultModel(m)" x-show="!m.isDefault">Set default</button>
                        <span x-show="m.isDefault" class="badge badge-accent text-[10px]">Default</span>
                      </td>
                    </tr>
                  </template>
                  <tr x-show="filteredModels.length === 0">
                    <td colspan="8" class="text-center py-8 text-xs text-[var(--text-muted)]">No models found</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </template>

      <!-- Usage Section -->
      <template x-if="currentPage === 'usage'">
        <div class="space-y-4">
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
            <template x-for="s in usageStats" :key="s.label">
              <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-4">
                <div class="text-[10px] font-medium text-[var(--text-muted)] uppercase tracking-wider" x-text="s.label"></div>
                <div class="stat-value text-xl font-bold text-[var(--text-primary)] mt-1" x-text="s.value"></div>
              </div>
            </template>
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-5">
              <h3 class="text-sm font-semibold text-[var(--text-primary)] mb-4">Daily Requests</h3>
              <div class="flex items-end gap-1.5 h-32" id="requests-chart">
                <template x-for="(d, i) in chartData" :key="i">
                  <div class="flex-1 flex flex-col items-center gap-1">
                    <div class="chart-bar w-full rounded-t-sm" :style="'height: ' + (d.value / Math.max(...chartData.map(x=>x.value)) * 100) + '%'" :class="d.value > 0 ? 'bg-[var(--accent)]/60 hover:bg-[var(--accent)]' : 'bg-transparent'" style="min-height:2px"></div>
                    <span class="text-[8px] text-[var(--text-muted)]" x-text="d.label"></span>
                  </div>
                </template>
              </div>
            </div>
            <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-5">
              <h3 class="text-sm font-semibold text-[var(--text-primary)] mb-4">Provider Breakdown</h3>
              <div class="space-y-3">
                <template x-for="p in providerBreakdown" :key="p.name">
                  <div>
                    <div class="flex justify-between text-xs mb-1"><span class="text-[var(--text-secondary)]" x-text="p.name"></span><span class="text-[var(--text-primary)]" x-text="p.percentage + '%'"></span></div>
                    <div class="h-1.5 bg-[var(--bg-elevated)] rounded-full overflow-hidden">
                      <div class="h-full rounded-full transition-all duration-700" :style="'width: ' + p.percentage + '%'" :class="p.color"></div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- Prompts Section -->
      <template x-if="currentPage === 'prompts'">
        <div class="space-y-4">
          <div class="flex items-center justify-between">
            <p class="text-xs text-[var(--text-muted)]"><span x-text="prompts.length"></span> saved prompts</p>
            <button class="btn btn-primary btn-sm" @click="openNewPrompt()">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              New Prompt
            </button>
          </div>
          <div class="grid-cards">
            <template x-for="p in prompts" :key="p.id">
              <div class="card-hover bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-4 transition-all duration-200">
                <div class="flex items-start justify-between mb-2">
                  <div>
                    <div class="text-sm font-medium text-[var(--text-primary)]" x-text="p.name"></div>
                    <p class="text-[10px] text-[var(--text-muted)] mt-0.5" x-text="p.content ? p.content.substring(0, 60) + '...' : ''"></p>
                  </div>
                  <button class="btn-icon" @click="pinPrompt(p.id)">
                    <svg class="w-3.5 h-3.5" :class="p.pinned ? 'text-[var(--accent)] fill-[var(--accent)]' : 'text-[var(--text-muted)]'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                  </button>
                </div>
                <div class="flex items-center gap-2 mt-3 pt-3 border-t border-[var(--border)]">
                  <span class="badge badge-neutral text-[10px]" x-text="p.provider || 'openai'"></span>
                  <span class="text-[10px] text-[var(--text-muted)]" x-text="'v' + (p.version || 1)"></span>
                  <span class="ml-auto text-[10px] text-[var(--text-muted)]" x-text="p.updatedAt || ''"></span>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Agents Section -->
      <template x-if="currentPage === 'agents'">
        <div class="space-y-4">
          <div class="flex items-center justify-between">
            <p class="text-xs text-[var(--text-muted)]"><span x-text="agents.length"></span> agents</p>
            <button class="btn btn-primary btn-sm" @click="openNewAgent()">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              Create Agent
            </button>
          </div>
          <div class="grid-cards">
            <template x-for="a in agents" :key="a.id">
              <div class="card-hover bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-4 transition-all duration-200">
                <div class="flex items-start gap-3 mb-3">
                  <div class="w-9 h-9 rounded-full bg-[var(--accent)]/15 flex items-center justify-center text-sm font-medium text-[var(--accent)] flex-shrink-0" x-text="a.name.charAt(0).toUpperCase()"></div>
                  <div class="flex-1 min-w-0">
                    <div class="text-sm font-medium text-[var(--text-primary)]" x-text="a.name"></div>
                    <p class="text-[10px] text-[var(--text-muted)] truncate" x-text="a.description || ''"></p>
                  </div>
                  <span class="status-dot" :class="a.enabled ? 'connected' : 'disconnected'" style="margin-top:6px"></span>
                </div>
                <div class="flex items-center gap-2 text-[10px] text-[var(--text-muted)] mb-3">
                  <span class="badge badge-neutral" x-text="a.model || 'gpt-4'"></span>
                  <span x-show="a.knowledgeBase">KB: <span x-text="a.knowledgeBase"></span></span>
                  <span x-show="a.memory" class="badge badge-info">Memory</span>
                </div>
                <div class="flex gap-2 pt-3 border-t border-[var(--border)]">
                  <button class="btn btn-secondary btn-sm flex-1" @click="chatWithAgent(a)">Chat</button>
                  <button class="btn btn-ghost btn-sm" @click="editAgent(a)">Edit</button>
                  <button class="btn btn-ghost btn-sm text-[var(--danger)]" @click="deleteAgent(a.id)">Delete</button>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Workflows Section -->
      <template x-if="currentPage === 'workflows'">
        <div class="space-y-4">
          <div class="flex items-center justify-between">
            <p class="text-xs text-[var(--text-muted)]"><span x-text="workflows.length"></span> workflows</p>
            <button class="btn btn-primary btn-sm" @click="openNewWorkflow()">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              Create Workflow
            </button>
          </div>
          <div class="grid-cards">
            <template x-for="w in workflows" :key="w.id">
              <div class="card-hover bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-4 transition-all duration-200">
                <div class="flex items-start justify-between mb-3">
                  <div>
                    <div class="text-sm font-medium text-[var(--text-primary)]" x-text="w.name"></div>
                    <div class="flex items-center gap-2 mt-1">
                      <span class="badge" :class="w.enabled ? 'badge-success' : 'badge-neutral'" x-text="w.enabled ? 'Active' : 'Inactive'"></span>
                      <span class="text-[10px] text-[var(--text-muted)]" x-text="w.nodes + ' nodes'"></span>
                    </div>
                  </div>
                  <button class="btn btn-secondary btn-sm" @click="executeWorkflow(w.id)">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/></svg>
                    Run
                  </button>
                </div>
                <div class="flex items-center gap-2 text-[10px] text-[var(--text-muted)]">
                  <span>Last run: <span x-text="w.lastRun || 'Never'"></span></span>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Documents Section -->
      <template x-if="currentPage === 'documents'">
        <div class="space-y-4">
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
            <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-4">
              <div class="text-[10px] font-medium text-[var(--text-muted)] uppercase">Documents</div>
              <div class="stat-value text-lg font-bold text-[var(--text-primary)] mt-1" x-text="docStats.documents || 0"></div>
            </div>
            <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-4">
              <div class="text-[10px] font-medium text-[var(--text-muted)] uppercase">Chunks</div>
              <div class="stat-value text-lg font-bold text-[var(--text-primary)] mt-1" x-text="docStats.chunks || 0"></div>
            </div>
            <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-4">
              <div class="text-[10px] font-medium text-[var(--text-muted)] uppercase">Embeddings</div>
              <div class="stat-value text-lg font-bold text-[var(--text-primary)] mt-1" x-text="docStats.embeddings || 0"></div>
            </div>
            <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-4">
              <div class="text-[10px] font-medium text-[var(--text-muted)] uppercase">Storage</div>
              <div class="stat-value text-lg font-bold text-[var(--text-primary)] mt-1" x-text="docStats.storage || '0 MB'"></div>
            </div>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-primary btn-sm">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
              Upload
            </button>
            <button class="btn btn-secondary btn-sm">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
              Re-index
            </button>
          </div>
        </div>
      </template>

      <!-- Settings Section -->
      <template x-if="currentPage === 'settings'">
        <div class="max-w-2xl space-y-4">
          <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-5 space-y-4">
            <h3 class="text-sm font-semibold text-[var(--text-primary)]">Gateway Configuration</h3>
            <div class="space-y-3">
              <div><label>Gateway URL</label><input type="text" x-model="settings.gatewayUrl" placeholder="http://localhost:8000"></div>
              <div><label>API Token</label><input type="password" x-model="settings.apiToken" placeholder="Enter your API token"></div>
            </div>
            <div class="flex gap-2 pt-2">
              <button class="btn btn-primary btn-sm" @click="saveSettings()">Save Changes</button>
              <button class="btn btn-ghost btn-sm" @click="resetSettings()">Reset</button>
            </div>
          </div>
          <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-xl p-5 space-y-4">
            <h3 class="text-sm font-semibold text-[var(--text-primary)]">Preferences</h3>
            <div class="space-y-3">
              <div class="flex items-center justify-between"><span class="text-sm text-[var(--text-secondary)]">Default Provider</span>
                <select class="w-auto text-xs py-1.5 px-3 bg-[var(--bg-elevated)] border border-[var(--border)] rounded-md outline-none focus:border-[var(--accent)]" x-model="settings.defaultProvider">
                  <option value="">Auto</option>
                  <template x-for="p in providers" :key="p.id"><option :value="p.id" x-text="p.name"></option></template>
                </select>
              </div>
              <div class="flex items-center justify-between"><span class="text-sm text-[var(--text-secondary)]">Max Retries</span>
                <input type="number" class="w-20 text-xs py-1.5 px-3 bg-[var(--bg-elevated)] border border-[var(--border)] rounded-md outline-none focus:border-[var(--accent)]" x-model="settings.maxRetries" min="0" max="10">

              <div class="flex items-center justify-between"><span class="text-sm text-[var(--text-secondary)]">Request Timeout (s)</span>
