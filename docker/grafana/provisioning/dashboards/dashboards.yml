# ==============================================================================
# Strata Grafana Dashboards Provisioning
# ==============================================================================
apiVersion: 1

providers:
  - name: 'Strata Dashboards'
    orgId: 1
    folder: 'Strata'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards
