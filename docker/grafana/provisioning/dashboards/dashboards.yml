# ==============================================================================
# NovaBase Grafana Dashboards Provisioning
# ==============================================================================
apiVersion: 1

providers:
  - name: 'NovaBase Dashboards'
    orgId: 1
    folder: 'NovaBase'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards
