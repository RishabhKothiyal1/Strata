# ==============================================================================
# NovaBase Prometheus Configuration
# ==============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape NATS monitoring endpoint via exporter
  - job_name: 'nats'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['nats-exporter:7777']

  # Scrape MinIO storage metrics
  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs:
      - targets: ['minio:9000']

  # Scrape NovaBase Services (ready for Phase 2+)
  - job_name: 'novabase-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-gateway:8000']
