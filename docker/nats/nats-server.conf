# ==============================================================================
# Strata NATS Server Configuration
# ==============================================================================

# Port for client connections
port: 4222

# Port for HTTP monitoring / metrics
http_port: 8222

# Enable JetStream for persistent message streaming and KV/Object stores
jetstream {
  # Store JetStream assets locally (will be mounted to a volume)
  store_dir: "/data/jetstream"
}


