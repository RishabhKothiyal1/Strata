version: '3.8'

services:
  # ============================================================================
  # CORE: API Gateway (Go)
  # ============================================================================
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: novabase-api-gateway
    restart: always
    ports:
      - "8000:8000"
    environment:
      PORT: ":8000"
      REDIS_ADDR: "novabase-redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_pass_123}
      JWT_SECRET: ${JWT_SECRET:-novabase_super_secret_jwt_key_98765}
      AUTH_SERVICE_URL: "http://auth:8081"
      REST_SERVICE_URL: "http://rest:8082"
      GRAPHQL_SERVICE_URL: "http://graphql:8087"
      REALTIME_SERVICE_URL: "http://realtime:8083"
      STORAGE_SERVICE_URL: "http://storage:8084"
      FUNCTIONS_SERVICE_URL: "http://functions:8085"
      AI_SERVICE_URL: "http://ai:8086"
      RATE_LIMIT_MAX: 100
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - novabase-network

  # ============================================================================
  # REST API: Dynamic REST Generator (Go)
  # ============================================================================
  rest:
    build:
      context: ./services/rest
      dockerfile: Dockerfile
    container_name: novabase-rest
    restart: always
    ports:
      - "8082:8082"
    environment:
      PORT: ":8082"
      DATABASE_URL: "postgres://novabase_admin:${POSTGRES_PASSWORD:-novabase_secure_pass_123}@novabase-postgres:5432/novabase?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/v1/rest/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - novabase-network

  # ============================================================================
  # AUTH: Authentication & Authorization Service (Go)
  # ============================================================================
  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: novabase-auth
    restart: always
    ports:
      - "8081:8081"
    environment:
      PORT: ":8081"
      DATABASE_URL: "postgres://novabase_admin:${POSTGRES_PASSWORD:-novabase_secure_pass_123}@novabase-postgres:5432/novabase?sslmode=disable"
      REDIS_ADDR: "novabase-redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_pass_123}
      JWT_SECRET: ${JWT_SECRET:-novabase_super_secret_jwt_key_98765}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/v1/auth/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - novabase-network

  # ============================================================================
  # GRAPHQL API: Auto-generated GraphQL Engine (Go)
  # ============================================================================
  graphql:
    build:
      context: ./services/graphql
      dockerfile: Dockerfile
    container_name: novabase-graphql
    restart: always
    ports:
      - "8087:8087"
    environment:
      PORT: ":8087"
      DATABASE_URL: "postgres://novabase_admin:${POSTGRES_PASSWORD:-novabase_secure_pass_123}@novabase-postgres:5432/novabase?sslmode=disable"
      NATS_URL: "nats://nats:4222"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8087/v1/graphql/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - novabase-network

  # ============================================================================
  # REALTIME: WebSocket Clustered Message Engine (Rust)
  # ============================================================================
  realtime:
    build:
      context: ./services/realtime
      dockerfile: Dockerfile
    container_name: novabase-realtime
    restart: always
    ports:
      - "8083:8083"
    environment:
      PORT: ":8083"
      NATS_URL: "nats://nats:4222"
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/v1/realtime/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - novabase-network

  # ============================================================================
  # STORAGE: S3 Bucket Manager and File Upload/Resizer (Rust)
  # ============================================================================
  storage:
    build:
      context: ./services/storage
      dockerfile: Dockerfile
    container_name: novabase-storage
    restart: always
    ports:
      - "8084:8084"
    environment:
      PORT: ":8084"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "novabase_storage_admin"
      MINIO_SECRET_KEY: "minio_secure_pass_123"
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/v1/storage/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - novabase-network

  # ============================================================================
  # FUNCTIONS: JavaScript Edge Functions Runner (Go + goja)
  # ============================================================================
  functions:
    build:
      context: ./services/functions
      dockerfile: Dockerfile
    container_name: novabase-functions
    restart: always
    ports:
      - "8085:8085"
    environment:
      PORT: ":8085"
      DATABASE_URL: "postgres://novabase_admin:${POSTGRES_PASSWORD:-novabase_secure_pass_123}@novabase-postgres:5432/novabase?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/v1/functions/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - novabase-network

  # ============================================================================
  # AI: Vector Store & Semantic Search Engine (Go + pgvector)
  # ============================================================================
  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    container_name: novabase-ai
    restart: always
    ports:
      - "8086:8086"
    environment:
      PORT: ":8086"
      DATABASE_URL: "postgres://novabase_admin:${POSTGRES_PASSWORD:-novabase_secure_pass_123}@novabase-postgres:5432/novabase?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8086/v1/ai/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - novabase-network

  # ============================================================================
  # DATABASE: Custom PostgreSQL 17 with PostGIS, pgvector, pgcrypto, uuid-ossp
  # ============================================================================
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: novabase-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-novabase_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novabase_secure_pass_123}
      POSTGRES_DB: ${POSTGRES_DB:-novabase}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - novabase-network

  # ============================================================================
  # CACHE & MESSAGING: Redis Cache
  # ============================================================================
  redis:
    image: redis:7.2-alpine
    container_name: novabase-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_pass_123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_pass_123}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - novabase-network

  # ============================================================================
  # MESSAGING: NATS Server with JetStream enabled
  # ============================================================================
  nats:
    image: nats:2.10-alpine
    container_name: novabase-nats
    restart: always
    command: "-c /etc/nats/nats-server.conf"
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITORING_PORT:-8222}:8222"
    volumes:
      - ./docker/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - novabase-network

  # ============================================================================
  # MONITORING: NATS Prometheus Exporter
  # ============================================================================
  nats-exporter:
    image: natsio/prometheus-nats-exporter:latest
    container_name: novabase-nats-exporter
    restart: always
    command: -varz -connz -subz -routez -jsz all http://nats:8222
    ports:
      - "7777:7777"
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7777/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - novabase-network

  # ============================================================================
  # OBJECT STORAGE: MinIO
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: novabase-minio
    restart: always
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-novabase_storage_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secure_pass_123}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - novabase-network

  # ============================================================================
  # PROVISIONING: Create MinIO Buckets automatically on start
  # ============================================================================
  minio-create-buckets:
    image: minio/mc:latest
    container_name: novabase-minio-provisioner
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-novabase_storage_admin} ${MINIO_ROOT_PASSWORD:-minio_secure_pass_123};
      /usr/bin/mc mb myminio/novabase-storage || true;
      /usr/bin/mc mb myminio/novabase-functions || true;
      /usr/bin/mc policy set public myminio/novabase-storage || true;
      echo 'MinIO buckets successfully provisioned!';
      exit 0;
      "
    networks:
      - novabase-network

  # ============================================================================
  # MONITORING: Prometheus
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: novabase-prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - novabase-network

  # ============================================================================
  # MONITORING: Grafana Visualizations
  # ============================================================================
  grafana:
    image: grafana/grafana:10.4.3
    container_name: novabase-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-grafana_secure_pass_123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - novabase-network

networks:
  novabase-network:
    name: novabase-network
    driver: bridge

volumes:
  postgres_data:
    name: novabase_postgres_data
  redis_data:
    name: novabase_redis_data
  minio_data:
    name: novabase_minio_data
  nats_data:
    name: novabase_nats_data
  prometheus_data:
    name: novabase_prometheus_data
  grafana_data:
    name: novabase_grafana_data
